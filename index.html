
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Viewer</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#1a1a1a;
  color:#eee;
}

.topbar {
  padding:10px;
  background:#222;
  position:sticky;
  top:0;
}

input {
  width:300px;
  padding:8px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:10px;
  padding:10px;
}

.card {
  background:#222;
  cursor:pointer;
}

.card img {
  width:100%;
}

.sidebar {
  position:fixed;
  right:0;
  top:0;
  width:200px;
  height:100%;
  background:#111;
  padding:10px;
}
</style>
</head>

<body>

<div class="topbar">
  <input id="search" placeholder="tag search...">
</div>

<div class="grid" id="grid"></div>

<script>
const data = [{"name": "screenshot_2026-01-24_032414.png", "src": "files/images/screenshot_2026-01-24_032414.png", "thumb": "files/thumbs/screenshot_2026-01-24_032414.png", "tags": [], "page": "pages/screenshot_2026-01-24_032414.png.html"}];

const grid = document.getElementById("grid");
const search = document.getElementById("search");

function render(list) {
  grid.innerHTML = "";

  list.forEach(item => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${item.thumb}">
      <div>${item.name}</div>
    `;

    div.onclick = () => {
      window.location = "pages/" + item.name + ".html";
    };

    grid.appendChild(div);
  });
}

search.addEventListener("input", () => {
  const q = search.value.toLowerCase();

  render(data.filter(d =>
    d.name.toLowerCase().includes(q)
  ));
});

render(data);
</script>

</body>
</html>
