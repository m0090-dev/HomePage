
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HomePage</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(#e0e0e0, #cfcfcf);
  color: #222;
}

/* ===== ガラスUI ===== */
.glass {
  background: rgba(255,255,255,0.25);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-radius: 12px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.15);
}

/* ===== ハンバーガー ===== */
.menu-btn {
  position: fixed;
  top: 20px;
  right: 20px;
  width: 35px;
  height: 25px;
  cursor: pointer;
  z-index: 10;
}
.menu-btn span {
  display: block;
  height: 4px;
  margin: 5px 0;
  background: #444;
  border-radius: 2px;
}

.side-menu {
  position: fixed;
  top: 0;
  right: -260px;
  width: 260px;
  height: 100%;
  padding-top: 80px;
  transition: right 0.4s ease;
  z-index: 9;
}
.side-menu.open { right: 0; }
.side-menu a {
  display: block;
  padding: 15px 25px;
  color: #222;
  text-decoration: none;
  font-size: 18px;
}

/* ===== セクション ===== */
.section {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* ===== タイトル物理アニメーション ===== */
.title {
  font-size: 40px;
  opacity: 0;
  transform: translateY(-300px);
}

/* 発火後 */
.title.show {
  animation: dropBounce 1.4s cubic-bezier(.25,.8,.25,1) forwards;
}

@keyframes dropBounce {
  0%   { opacity: 0; transform: translateY(-300px); }
  60%  { opacity: 1; transform: translateY(20px); }   /* 落下 */
  75%  { transform: translateY(-10px); }               /* 反発 */
  90%  { transform: translateY(5px); }                 /* 減衰 */
  100% { transform: translateY(0); }                   /* 静止 */
}

@media (max-width: 600px) {
  .title { font-size: 28px; }
}
</style>
</head>

<body>

<div class="menu-btn" onclick="toggleMenu()">
  <span></span><span></span><span></span>
</div>

<div id="menu" class="side-menu glass">
  <a href="#">Top</a>
</div>

<!-- 上部ダミーセクション -->
<div class="section">
  <h2>Scroll Down</h2>
</div>

<!-- タイトル表示セクション -->
<div class="section glass">
  <div id="mainTitle" class="title">My GitHub Page</div>
</div>

<!-- 下部ダミー -->
<div class="section">
  <h2>More Content</h2>
</div>

<script>
function toggleMenu() {
  document.getElementById("menu").classList.toggle("open");
}

// スクロール検知 → 表示
const title = document.getElementById("mainTitle");

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      title.classList.add("show");
    }
  });
}, { threshold: 0.6 });

observer.observe(title);
</script>

</body>
</html>
