
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HomePage</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  overflow: hidden;
  background: #dcdcdc;
}

#bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
}

/* クリック用オーバーレイ（メニュー開時のみ有効） */
#overlay {
  position: fixed;
  inset: 0;
  background: transparent;
  z-index: 1;
  display: none;
}

#overlay.active {
  display: block;
}

.glass {
  background: rgba(255, 255, 255, 0.25);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-radius: 12px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.15);
}

.main {
  position: relative;
  z-index: 2;
  opacity: 0;
  transform: translateX(80px);
  animation: slideFade 1.2s ease-out forwards;
  text-align: center;
  margin: 120px auto;
  padding: 40px;
  width: 90%;
  max-width: 500px;
}

@keyframes slideFade {
  to { opacity: 1; transform: translateX(0); }
}

.menu-btn {
  position: fixed;
  top: 20px;
  right: 20px;
  width: 35px;
  height: 25px;
  cursor: pointer;
  z-index: 3;
}

.menu-btn span {
  display: block;
  height: 4px;
  margin: 5px 0;
  background: #444;
  border-radius: 2px;
}

.side-menu {
  position: fixed;
  top: 0;
  right: -260px;
  width: 260px;
  height: 100%;
  padding-top: 80px;
  transition: right 0.4s ease;
  z-index: 3;
}

.side-menu a {
  display: block;
  padding: 15px 25px;
  color: #222;
  text-decoration: none;
  font-size: 18px;
}

.side-menu.open { right: 0; }

@media (max-width: 600px) {
  .main { margin-top: 100px; padding: 25px; }
}
</style>
</head>

<body>

<canvas id="bg"></canvas>
<div id="overlay" onclick="closeMenu()"></div>

<div class="menu-btn" onclick="toggleMenu(event)">
  <span></span><span></span><span></span>
</div>

<div id="menu" class="side-menu glass">
  <a href="#">Top</a>
</div>

<div class="main glass">
  <h1>My GitHub Page</h1>
  <p>Welcome</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script>
const menu = document.getElementById("menu");
const overlay = document.getElementById("overlay");

function toggleMenu(e) {
  e.stopPropagation();
  menu.classList.toggle("open");
  overlay.classList.toggle("active");
}

function closeMenu() {
  menu.classList.remove("open");
  overlay.classList.remove("active");
}

// ===== Three.js =====
const canvas = document.getElementById('bg');
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ canvas, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
camera.position.z = 5;

const light = new THREE.PointLight(0xffffff, 1);
light.position.set(5,5,5);
scene.add(light);

const geometry = new THREE.SphereGeometry(1, 32, 32);
const material = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.4, roughness: 0.3 });
const sphere = new THREE.Mesh(geometry, material);
scene.add(sphere);

let time = 0;

function animate() {
  requestAnimationFrame(animate);
  time += 0.02;            // 速度アップ
  sphere.position.z = Math.sin(time) * 2;  // 奥⇄手前の振り子
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
