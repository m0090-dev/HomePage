
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viewer</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#1a1a1a;
  color:#fff;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:10px;
  padding:10px;
}

.card {
  background:#222;
  cursor:pointer;
}
.card img {
  width:100%;
}
</style>
</head>

<body>

<input id="search" placeholder="search">

<div class="grid" id="grid"></div>

<script>
const data = [{"name": "screenshot_2026-01-24_032414.png", "type": "image", "src": "files/screenshot_2026-01-24_032414.png", "thumb": "files/thumbs/screenshot_2026-01-24_032414.png"}];

const grid = document.getElementById("grid");
const search = document.getElementById("search");

function render(list){
  grid.innerHTML="";

  list.forEach(i=>{
    const div=document.createElement("div");
    div.className="card";

    div.innerHTML =
      i.type==="image"
      ? `<img src="${i.thumb}"><div>${i.name}</div>`
      : `<div style="padding:10px">${i.name}</div>`;

    div.onclick=()=>location="pages/"+i.name+".html";
    grid.appendChild(div);
  });
}

search.addEventListener("input", ()=>{
  const q=search.value.toLowerCase();
  render(data.filter(d=>d.name.toLowerCase().includes(q)));
});

render(data);
</script>

</body>
</html>
