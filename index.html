<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HomePage</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #e0e0e0;
  overflow-x: hidden;
}

/* ===== メイン表示アニメーション ===== */
.main {
  opacity: 0;
  transform: translateX(100px);
  animation: slideFade 1s ease-out forwards;
  text-align: center;
  margin-top: 120px;
}

@keyframes slideFade {
  to {
    opacity: 1;
    transform: translateX(0);
  }
}

/* ===== ハンバーガーボタン ===== */
.menu-btn {
  position: fixed;
  top: 20px;
  right: 20px;
  width: 35px;
  height: 25px;
  cursor: pointer;
  z-index: 1001;
}

.menu-btn span {
  display: block;
  height: 4px;
  margin: 5px 0;
  background: #444;
  border-radius: 2px;
  transition: 0.3s;
}

/* ===== サイドメニュー ===== */
.side-menu {
  position: fixed;
  top: 0;
  right: -250px;
  width: 250px;
  height: 100%;
  background: #bdbdbd;
  box-shadow: -3px 0 10px rgba(0,0,0,0.2);
  padding-top: 80px;
  transition: right 0.4s ease;
  z-index: 1000;
}

.side-menu a {
  display: block;
  padding: 15px 25px;
  color: #222;
  text-decoration: none;
  font-size: 18px;
  transition: background 0.2s;
}

.side-menu a:hover {
  background: #9e9e9e;
}

/* 開いた状態 */
.side-menu.open {
  right: 0;
}
</style>
</head>

<body>

<!-- ハンバーガーメニュー -->
<div class="menu-btn" onclick="toggleMenu()">
  <span></span>
  <span></span>
  <span></span>
</div>

<!-- サイドメニュー -->
<div id="menu" class="side-menu">
  <a href="#">Top</a>
</div>

<!-- メインコンテンツ -->
<div class="main">
  <h1>My GitHub Page</h1>
  <p>Welcome</p>
</div>

<script>
function toggleMenu() {
  document.getElementById("menu").classList.toggle("open");
}
</script>

</body>
</html>
