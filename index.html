<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viewer</title>
<style>
*, *::before, *::after { box-sizing: border-box; }

body {
  margin: 0;
  background: #111;
  color: #eee;
  font-family: 'Segoe UI', system-ui, sans-serif;
  min-height: 100vh;
}

header {
  padding: 18px 16px 12px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid rgba(255,255,255,0.07);
  position: sticky;
  top: 0;
  background: rgba(17,17,17,0.95);
  backdrop-filter: blur(12px);
  z-index: 10;
}

header span {
  font-size: 13px;
  color: #666;
  white-space: nowrap;
}

#search {
  flex: 1;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 7px;
  color: #eee;
  padding: 7px 12px;
  font-size: 13px;
  outline: none;
  transition: border-color 0.15s;
}
#search:focus { border-color: rgba(255,255,255,0.28); }
#search::placeholder { color: #555; }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 10px;
  padding: 14px;
}

.card {
  background: #1c1c1c;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 8px;
  overflow: hidden;
  cursor: pointer;
  transition: border-color 0.15s, transform 0.12s, background 0.15s;
}
.card:hover {
  border-color: rgba(255,255,255,0.2);
  background: #222;
  transform: translateY(-2px);
}
.card:active {
  transform: translateY(0);
}

.card-thumb {
  width: 100%;
  aspect-ratio: 1;
  overflow: hidden;
  background: #161616;
  display: flex;
  align-items: center;
  justify-content: center;
}
.card-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.card-thumb .icon {
  font-size: 32px;
  opacity: 0.3;
}

.card-info {
  padding: 7px 9px 9px;
}
.card-name {
  font-size: 11.5px;
  color: #ccc;
  word-break: break-all;
  line-height: 1.4;
  margin-bottom: 3px;
}
.card-meta {
  font-size: 10px;
  color: #555;
  line-height: 1.4;
}

.empty {
  grid-column: 1/-1;
  text-align: center;
  color: #444;
  padding: 60px 0;
  font-size: 14px;
}
</style>
</head>
<body>

<header>
  <input id="search" type="search" placeholder="ファイル名で絞り込み…" autocomplete="off">
  <span id="count"></span>
</header>

<div class="grid" id="grid"></div>

<script>
const data = [{"name": "index.html", "type": "text", "src": "files/index.html", "size": "4.4 KB"}, {"name": "screenshot_2026-01-24_032414.png", "type": "image", "src": "files/screenshot_2026-01-24_032414.png", "thumb": "files/thumbs/screenshot_2026-01-24_032414.png", "size": "38.2 KB", "width": 1001, "height": 761}, {"name": "test.json", "type": "text", "src": "files/test.json", "size": "561 B"}, {"name": "test.toml", "type": "text", "src": "files/test.toml", "size": "395 B"}];
const grid = document.getElementById("grid");
const countEl = document.getElementById("count");

function render(list) {
  grid.innerHTML = "";
  countEl.textContent = list.length + " files";

  if (list.length === 0) {
    grid.innerHTML = '<div class="empty">一致するファイルがありません</div>';
    return;
  }

  list.forEach(item => {
    const card = document.createElement("div");
    card.className = "card";

    let thumbHtml;
    if (item.type === "image") {
      thumbHtml = `<div class="card-thumb"><img src="${item.thumb}" loading="lazy" alt="${item.name}"></div>`;
    } else {
      const ext = item.name.includes(".") ? item.name.split(".").pop().toUpperCase() : "FILE";
      thumbHtml = `<div class="card-thumb"><span class="icon">${ext}</span></div>`;
    }

    let metaHtml = item.size || "";
    if (item.type === "image" && item.width) {
      metaHtml += ` · ${item.width}×${item.height}px`;
    }

    card.innerHTML = `
      ${thumbHtml}
      <div class="card-info">
        <div class="card-name">${item.name}</div>
        <div class="card-meta">${metaHtml}</div>
      </div>
    `;

    card.addEventListener("click", () => {
      location.href = "pages/" + encodeURIComponent(item.name) + ".html";
    });

    grid.appendChild(card);
  });
}

document.getElementById("search").addEventListener("input", e => {
  const q = e.target.value.toLowerCase();
  render(data.filter(d => d.name.toLowerCase().includes(q)));
});

render(data);
</script>
</body>
</html>
