<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="google" content="notranslate">
<title>build-and-push.bat</title>
<style>
*, *::before, *::after { box-sizing: border-box; }

body {
  margin: 0;
  background: #111;
  color: #eee;
  font-family: 'Segoe UI', system-ui, sans-serif;
  overflow: auto;
}

/* ── ツールバー ── */
.toolbar {
  position: fixed;
  top: 14px;
  left: 14px;
  z-index: 1000;
  background: rgba(20,20,20,0.88);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: 10px;
  padding: 10px 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-width: 220px;
  max-width: 300px;
  transition: opacity 0.2s, transform 0.2s;
  box-shadow: 0 4px 24px rgba(0,0,0,0.5);
}

.meta {
  font-size: 11px;
  color: #aaa;
  word-break: break-all;
  line-height: 1.5;
  border-bottom: 1px solid rgba(255,255,255,0.07);
  padding-bottom: 8px;
}

.btns {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}

.btns button,
.btns .btn-a {
  background: rgba(255,255,255,0.07);
  color: #ddd;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 6px;
  padding: 6px 11px;
  font-size: 13px;
  cursor: pointer;
  text-decoration: none;
  transition: background 0.15s, color 0.15s;
  line-height: 1;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 32px;
}

.btns button:hover,
.btns .btn-a:hover {
  background: rgba(255,255,255,0.16);
  color: #fff;
}

/* ── UI非表示トグル ── */
.toggle-ui {
  position: fixed;
  top: 14px;
  right: 14px;
  z-index: 1001;
  width: 34px;
  height: 34px;
  background: rgba(20,20,20,0.75);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px;
  color: #aaa;
  font-size: 15px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s, color 0.15s, opacity 0.2s;
}
.toggle-ui:hover { background: rgba(60,60,60,0.9); color: #fff; }

/* UI非表示状態 */
body.ui-hidden .toolbar {
  opacity: 0;
  pointer-events: none;
  transform: translateY(-6px);
}
body.ui-hidden .toggle-ui {
  opacity: 0.25;
  background: transparent;
  border-color: transparent;
}
body.ui-hidden .toggle-ui:hover {
  opacity: 0.8;
}


  #text-wrap {
    padding: 70px 24px 40px;
    max-width: 860px;
    margin: 0 auto;
  }
  pre {
    white-space: pre-wrap;
    word-break: break-word;
    font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 13.5px;
    line-height: 1.75;
    color: #d4d4d4;
  }

</style>
</head>
<body>


<div class="toolbar" id="toolbar">
  <div class="meta">build-and-push.bat &nbsp;·&nbsp; 186 B</div>
  <div class="btns">
    <button id="copyBtn" onclick="copyText()">Copy</button>
    <a class="btn-a" href="../files/build-and-push.bat" download="build-and-push.bat" title="ダウンロード">↓</a>
    <a class="btn-a" href="../index.html" title="一覧へ">☰</a>
  </div>
</div>
<button class="toggle-ui" id="toggleBtn" onclick="toggleUI()" title="UI表示切替">✕</button>


<div id="text-wrap">
  <pre id="text"></pre>
</div>


<script>

fetch("../files/build-and-push.bat")
  .then(r => r.text())
  .then(t => {
    document.getElementById("text").textContent = t;
  });

function copyText() {
  const t = document.getElementById("text").textContent;
  navigator.clipboard.writeText(t).then(() => {
    const btn = document.getElementById("copyBtn");
    btn.textContent = "✓ Copied";
    setTimeout(() => btn.textContent = "Copy", 1500);
  });
}


function toggleUI() {
  const hidden = document.body.classList.toggle("ui-hidden");
  document.getElementById("toggleBtn").textContent = hidden ? "☰" : "✕";
}

</script>
</body>
</html>
