
<!DOCTYPE html>
<html lang="ja">
<head>
<meta name="google" content="notranslate">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>screenshot_2026-01-24_032414.png</title>

<style>

body {
  margin:0;
  background:#111;
  font-family:sans-serif;
  color:#fff;
}

.toolbar {
  position:fixed;
  top:10px;
  left:10px;
  z-index:9999;
  background:rgba(30,30,30,0.95);
  padding:10px;
  border-radius:8px;
  width:240px;
}

button {
  background:#333;
  color:#fff;
  border:none;
  padding:8px;
  margin:2px 0;
  width:100%;
  cursor:pointer;
}

.info {
  font-size:12px;
  margin-bottom:8px;
  word-break:break-all;
}

#wrap {
  width:100vw;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

#img {
  max-width:none;
  transform-origin:center;
}

pre {
  white-space:pre-wrap;
  word-break:break-word;
  padding:20px;
}

.copyBtn {
  position:fixed;
  bottom:10px;
  right:10px;
  background:#444;
  padding:10px;
  cursor:pointer;
}
body.hide-ui .toolbar {
  display: none;
}

body.hide-ui .toggle {
  opacity: 0.3;
}
</style>
</head>

<body>

<div class="toolbar">
  <div class="info">screenshot_2026-01-24_032414.png</div>
  <button onclick="zoom(1.1)">＋</button>
  <button onclick="zoom(0.9)">－</button>
  <button onclick="rotate(90)">rotate</button>
  <button onclick="reset()">reset</button>
</div>

<div id="wrap">
  <img id="img" src="../files/screenshot_2026-01-24_032414.png">
</div>

<div class="toggle" onclick="toggleUI()">UI</div>

<script>
let scale=1, rot=0;
const img=document.getElementById("img");

function toggleUI() {
  document.body.classList.toggle("hide-ui");
}

function update(){
  img.style.transform=`scale(${scale}) rotate(${rot}deg)`;
}

function zoom(v){scale*=v;update();}
function rotate(v){rot+=v;update();}
function reset(){scale=1;rot=0;update();}

update();
</script>

</body>
</html>
