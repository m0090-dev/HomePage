<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="google" content="notranslate">
<title>screenshot_2026-01-24_032414.png</title>
<style>
*, *::before, *::after { box-sizing: border-box; }

body {
  margin: 0;
  background: #111;
  color: #eee;
  font-family: 'Segoe UI', system-ui, sans-serif;
  overflow: hidden;
}

/* ── ツールバー ── */
.toolbar {
  position: fixed;
  top: 14px;
  left: 14px;
  z-index: 1000;
  background: rgba(20,20,20,0.88);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: 10px;
  padding: 10px 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-width: 220px;
  max-width: 300px;
  transition: opacity 0.2s, transform 0.2s;
  box-shadow: 0 4px 24px rgba(0,0,0,0.5);
}

.meta {
  font-size: 11px;
  color: #aaa;
  word-break: break-all;
  line-height: 1.5;
  border-bottom: 1px solid rgba(255,255,255,0.07);
  padding-bottom: 8px;
}

.btns {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}

.btns button,
.btns .btn-a {
  background: rgba(255,255,255,0.07);
  color: #ddd;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 6px;
  padding: 6px 11px;
  font-size: 13px;
  cursor: pointer;
  text-decoration: none;
  transition: background 0.15s, color 0.15s;
  line-height: 1;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 32px;
}

.btns button:hover,
.btns .btn-a:hover {
  background: rgba(255,255,255,0.16);
  color: #fff;
}

/* ── UI非表示トグル ── */
.toggle-ui {
  position: fixed;
  top: 14px;
  right: 14px;
  z-index: 1001;
  width: 34px;
  height: 34px;
  background: rgba(20,20,20,0.75);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px;
  color: #aaa;
  font-size: 15px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s, color 0.15s, opacity 0.2s;
}
.toggle-ui:hover { background: rgba(60,60,60,0.9); color: #fff; }

/* UI非表示状態 */
body.ui-hidden .toolbar {
  opacity: 0;
  pointer-events: none;
  transform: translateY(-6px);
}
body.ui-hidden .toggle-ui {
  opacity: 0.25;
  background: transparent;
  border-color: transparent;
}
body.ui-hidden .toggle-ui:hover {
  opacity: 0.8;
}


  #wrap {
    width: 100vw;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    cursor: grab;
    user-select: none;
  }
  #img {
    max-width: none;
    max-height: none;
    display: block;
    transform-origin: center;
    pointer-events: none;
  }

</style>
</head>
<body>


<div class="toolbar" id="toolbar">
  <div class="meta">screenshot_2026-01-24_032414.png &nbsp;·&nbsp; 38.2 KB &nbsp;·&nbsp; 1001×761px</div>
  <div class="btns">
    <button onclick="zoom(1.15)" title="拡大">＋</button>
    <button onclick="zoom(1/1.15)" title="縮小">－</button>
    <button onclick="rotate(90)" title="回転">↻</button>
    <button onclick="reset()" title="リセット">⊡</button>
    <a class="btn-a" href="../files/screenshot_2026-01-24_032414.png" download="screenshot_2026-01-24_032414.png" title="ダウンロード">↓</a>
    <a class="btn-a" href="../index.html" title="一覧へ">☰</a>
  </div>
</div>
<button class="toggle-ui" id="toggleBtn" onclick="toggleUI()" title="UI表示切替">✕</button>


<div id="wrap">
  <img id="img" src="../files/screenshot_2026-01-24_032414.png" draggable="false">
</div>


<script>

let scale = 1, rot = 0;
let isDrag = false, startX, startY, ox = 0, oy = 0, dx = 0, dy = 0;
const img = document.getElementById("img");
const wrap = document.getElementById("wrap");

function applyTransform() {
  img.style.transform = `translate(${ox+dx}px, ${oy+dy}px) scale(${scale}) rotate(${rot}deg)`;
}

function zoom(v) { scale = Math.max(0.1, scale * v); applyTransform(); }
function rotate(v) { rot += v; applyTransform(); }
function reset() { scale = 1; rot = 0; ox = 0; oy = 0; dx = 0; dy = 0; applyTransform(); }

// ドラッグ（マウス）
wrap.addEventListener("mousedown", e => {
  isDrag = true; startX = e.clientX; startY = e.clientY;
  wrap.style.cursor = "grabbing";
});
window.addEventListener("mousemove", e => {
  if (!isDrag) return;
  dx = e.clientX - startX; dy = e.clientY - startY;
  applyTransform();
});
window.addEventListener("mouseup", () => {
  if (!isDrag) return;
  isDrag = false; ox += dx; oy += dy; dx = 0; dy = 0;
  wrap.style.cursor = "grab";
});

// ドラッグ（タッチ）
let lastTouchDist = null;
wrap.addEventListener("touchstart", e => {
  if (e.touches.length === 1) {
    isDrag = true;
    startX = e.touches[0].clientX; startY = e.touches[0].clientY;
  } else if (e.touches.length === 2) {
    isDrag = false;
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    lastTouchDist = Math.sqrt(dx*dx + dy*dy);
  }
  e.preventDefault();
}, {passive: false});
wrap.addEventListener("touchmove", e => {
  if (e.touches.length === 1 && isDrag) {
    dx = e.touches[0].clientX - startX; dy = e.touches[0].clientY - startY;
    applyTransform();
  } else if (e.touches.length === 2 && lastTouchDist) {
    const ddx = e.touches[0].clientX - e.touches[1].clientX;
    const ddy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(ddx*ddx + ddy*ddy);
    scale = Math.max(0.1, scale * (dist / lastTouchDist));
    lastTouchDist = dist;
    applyTransform();
  }
  e.preventDefault();
}, {passive: false});
wrap.addEventListener("touchend", e => {
  if (e.touches.length === 0) {
    ox += dx; oy += dy; dx = 0; dy = 0;
    isDrag = false; lastTouchDist = null;
  }
});

// ホイールズーム
wrap.addEventListener("wheel", e => {
  e.preventDefault();
  zoom(e.deltaY < 0 ? 1.1 : 0.9);
}, {passive: false});

applyTransform();


function toggleUI() {
  const hidden = document.body.classList.toggle("ui-hidden");
  document.getElementById("toggleBtn").textContent = hidden ? "☰" : "✕";
}

</script>
</body>
</html>
