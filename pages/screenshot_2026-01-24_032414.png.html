
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>screenshot_2026-01-24_032414.png</title>

<style>
body {
  margin:0;
  background:#111;
  overflow:hidden;
  font-family:sans-serif;
  color:#fff;
}

/* 画像表示エリア */
#wrap {
  width:100vw;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:grab;
}

#img {
  max-width:none;
  transform-origin:center;
}

/* UIパネル（固定＆画面サイズ対応） */
.toolbar {
  position:fixed;
  top:10px;
  left:10px;
  z-index:9999;

  background:rgba(30,30,30,0.95);
  padding:10px;
  border-radius:8px;

  display:flex;
  flex-direction:column;
  gap:6px;

  width:200px;
  max-width:80vw;
  box-sizing:border-box;
}

.toolbar.hidden {
  display:none;
}

/* ボタン */
button {
  padding:6px 10px;
  background:#333;
  color:#fff;
  border:none;
  cursor:pointer;
  font-size:13px;
}

button:hover {
  background:#555;
}

/* 情報表示 */
.info {
  font-size:12px;
  color:#fff;
  opacity:0.9;
  margin-bottom:6px;
  white-space:pre-wrap;
}

/* UIトグルボタン */
.toggle {
  position:fixed;
  top:10px;
  right:10px;
  z-index:10000;

  background:#333;
  color:#fff;
  padding:8px 10px;
  border-radius:6px;
  cursor:pointer;
  font-size:12px;
}

.toggle:hover {
  background:#555;
}
</style>
</head>

<body>

<div class="toggle" onclick="toggleUI()">UI</div>

<div class="toolbar" id="ui">
  <div class="info" id="info">loading...</div>

  <button onclick="zoom(1.1)">＋ zoom</button>
  <button onclick="zoom(0.9)">－ zoom</button>
  <button onclick="rotate(90)">rotate</button>
  <button onclick="flipX()">flip X</button>
  <button onclick="flipY()">flip Y</button>
  <button onclick="reset()">reset</button>
</div>

<div id="wrap">
  <img id="img" src="../files/images/screenshot_2026-01-24_032414.png">
</div>

<script>
let scale = 1;
let rot = 0;
let fx = 1;
let fy = 1;

let pos = {x:0,y:0};
let dragging = false;
let last = {x:0,y:0};

const img = document.getElementById("img");
const wrap = document.getElementById("wrap");
const ui = document.getElementById("ui");
const info = document.getElementById("info");

/* 画像情報 */
img.onload = () => {
  info.textContent =
    "file: screenshot_2026-01-24_032414.png\n" +
    "size: " + img.naturalWidth + " x " + img.naturalHeight;
};

function update() {
  img.style.transform =
    `translate(${pos.x}px, ${pos.y}px)
     scale(${scale})
     rotate(${rot}deg)
     scaleX(${fx})
     scaleY(${fy})`;
}

function zoom(v) {
  scale *= v;
  update();
}

function rotate(v) {
  rot += v;
  update();
}

function flipX() {
  fx *= -1;
  update();
}

function flipY() {
  fy *= -1;
  update();
}

function reset() {
  scale = 1;
  rot = 0;
  fx = 1;
  fy = 1;
  pos = {x:0,y:0};
  update();
}

function toggleUI() {
  ui.classList.toggle("hidden");
}

/* ドラッグ */
wrap.addEventListener("mousedown", e => {
  dragging = true;
  wrap.style.cursor = "grabbing";
  last = {x:e.clientX, y:e.clientY};
});

window.addEventListener("mouseup", () => {
  dragging = false;
  wrap.style.cursor = "grab";
});

window.addEventListener("mousemove", e => {
  if (!dragging) return;

  pos.x += e.clientX - last.x;
  pos.y += e.clientY - last.y;

  last = {x:e.clientX, y:e.clientY};
  update();
});

update();
</script>

</body>
</html>
