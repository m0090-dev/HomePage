
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>screenshot_2026-01-24_032414.png</title>

<style>
body {
  margin:0;
  background:#111;
  overflow:hidden;
  font-family:sans-serif;
  color:#fff;
  touch-action:none;
}

/* ===== 画像 ===== */
#wrap {
  width:100vw;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:grab;
  overflow:hidden;
}

#img {
  max-width:none;
  max-height:none;
  transform-origin:center;
  will-change:transform;
}

/* ===== UI ===== */
.toolbar {
  position:fixed;
  top:10px;
  left:10px;
  z-index:9999;
  background:rgba(30,30,30,0.95);
  padding:10px;
  border-radius:8px;
  display:flex;
  flex-direction:column;
  gap:6px;
  width:220px;
  box-sizing:border-box;
}

.toolbar.hidden {
  display:none;
}

button {
  background:#333;
  color:#fff;
  border:none;
  padding:6px;
  cursor:pointer;
  font-size:12px;
}

button:active {
  background:#555;
}

.toggle {
  position:fixed;
  top:10px;
  right:10px;
  z-index:10000;
  background:#333;
  padding:10px;
  cursor:pointer;
  color:#fff;
  border-radius:6px;
  font-size:12px;
}

.info {
  font-size:12px;
  line-height:1.4;
  opacity:0.9;
  margin-bottom:6px;
  word-break:break-all;
}

/* ===== モバイル縦持ち最適化 ===== */
@media (max-width:768px) and (orientation: portrait) {

  .toolbar {
    width:90vw;
    left:5vw;
    padding:14px;
  }

  button {
    padding:14px;
    font-size:14px;
  }

  .info {
    font-size:14px;
  }

  .toggle {
    padding:14px;
    font-size:14px;
  }
}

/* 横でも一応崩れ防止 */
@media (max-width:768px) and (orientation: landscape) {
  .toolbar {
    width:60vw;
  }
}
</style>
</head>

<body>

<div class="toggle" onclick="toggleUI()">UI</div>

<div class="toolbar" id="ui">
  <div class="info" id="info">
    file: screenshot_2026-01-24_032414.png<br>
    size: loading...
  </div>

  <button onclick="zoom(1.1)">＋ zoom</button>
  <button onclick="zoom(0.9)">－ zoom</button>
  <button onclick="rotate(90)">rotate</button>
  <button onclick="flipX()">flip X</button>
  <button onclick="flipY()">flip Y</button>
  <button onclick="reset()">reset</button>
  <button onclick="toggleFull()">fullscreen</button>
</div>

<div id="wrap">
  <img id="img" src="../files/images/screenshot_2026-01-24_032414.png">
</div>

<script>
let scale = 1;
let rot = 0;
let fx = 1;
let fy = 1;

let pos = {x:0,y:0};
let dragging = false;
let last = {x:0,y:0};

const img = document.getElementById("img");
const wrap = document.getElementById("wrap");
const ui = document.getElementById("ui");
const info = document.getElementById("info");

/* 画像情報 */
img.onload = () => {
  info.innerHTML =
    "file: screenshot_2026-01-24_032414.png<br>" +
    "size: " + img.naturalWidth + " x " + img.naturalHeight;
};

/* 更新 */
function update() {
  img.style.transform =
    `translate(${pos.x}px, ${pos.y}px)
     scale(${scale})
     rotate(${rot}deg)
     scaleX(${fx})
     scaleY(${fy})`;
}

/* 操作 */
function zoom(v) {
  scale *= v;
  update();
}

function rotate(v) {
  rot += v;
  update();
}

function flipX() {
  fx *= -1;
  update();
}

function flipY() {
  fy *= -1;
  update();
}

function reset() {
  scale = 1;
  rot = 0;
  fx = 1;
  fy = 1;
  pos = {x:0,y:0};
  update();
}

function toggleUI() {
  ui.classList.toggle("hidden");
}

function toggleFull() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}

/* マウス */
wrap.addEventListener("mousedown", e => {
  dragging = true;
  wrap.style.cursor = "grabbing";
  last = {x:e.clientX,y:e.clientY};
});

window.addEventListener("mouseup", () => {
  dragging = false;
  wrap.style.cursor = "grab";
});

window.addEventListener("mousemove", e => {
  if (!dragging) return;
  pos.x += e.clientX - last.x;
  pos.y += e.clientY - last.y;
  last = {x:e.clientX,y:e.clientY};
  update();
});

/* ホイール */
window.addEventListener("wheel", e => {
  scale *= (e.deltaY < 0 ? 1.1 : 0.9);
  update();
}, { passive: true });

/* キーボード */
const files = ["screenshot_2026-01-24_032414.png"] ;
let current = files.indexOf("screenshot_2026-01-24_032414.png");

window.addEventListener("keydown", e => {
  if (e.key === "ArrowLeft") navigate(-1);
  if (e.key === "ArrowRight") navigate(1);
  if (e.key === "f") toggleFull();
});

function navigate(dir) {
  current += dir;
  if (current < 0) current = files.length - 1;
  if (current >= files.length) current = 0;
  window.location = "../pages/" + files[current] + ".html";
}

/* タッチ（縦持ち最適化） */
let touches = [];

window.addEventListener("touchstart", e => {
  touches = e.touches;
}, { passive: false });

window.addEventListener("touchmove", e => {
  e.preventDefault();

  if (e.touches.length == 1) {
    let t = e.touches[0];
    pos.x += (t.clientX - (touches[0]?.clientX || 0)) * 1.3;
    pos.y += (t.clientY - (touches[0]?.clientY || 0)) * 1.3;
    update();
  }

  if (e.touches.length == 2) {
    let dx = e.touches[0].clientX - e.touches[1].clientX;
    let dy = e.touches[0].clientY - e.touches[1].clientY;
    let dist = Math.sqrt(dx*dx + dy*dy);

    let odx = touches[0].clientX - touches[1].clientX;
    let ody = touches[0].clientY - touches[1].clientY;
    let odist = Math.sqrt(odx*odx + ody*ody);

    scale *= dist / odist;
    update();
  }

  touches = e.touches;
}, { passive: false });

/* ダブルタップズーム */
let lastTap = 0;

window.addEventListener("touchend", () => {
  const now = Date.now();
  if (now - lastTap < 300) {
    scale *= 1.2;
    update();
  }
  lastTap = now;
});

update();
</script>

</body>
</html>
